name: "Deploy ECS with Dynatrace OneAgent"

on:
  workflow_dispatch:
    inputs:
      ecs_cluster_name:
        description: "The name of the target AWS ECS Cluster"
        required: true
        default: "dynatrace-monitored-cluster"
      aws_region:
        description: "AWS Region (leave blank to use the AWS_REGION secret)"
        required: false
      dynatrace_api_url:
        description: "Dynatrace Environment API URL (leave blank to use the DYNATRACE_API_URL secret)"
        required: false
  push:
    branches:
      - main
    paths:
      - "terraform/**"

jobs:
  terraform:
    name: "Terraform Deploy"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.aws_region || secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=ecs-dynatrace/terraform.tfstate" \
            -backend-config="region=${{ github.event.inputs.aws_region || secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="cluster_name=${{ github.event.inputs.ecs_cluster_name || secrets.ECS_CLUSTER_NAME }}" \
            -var="aws_region=${{ github.event.inputs.aws_region || secrets.AWS_REGION }}" \
            -var="dynatrace_api_url=${{ github.event.inputs.dynatrace_api_url || secrets.DYNATRACE_API_URL }}" \
            -var="dynatrace_paas_token=${{ secrets.DYNATRACE_PAAS_TOKEN }}" \
            -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve tfplan
