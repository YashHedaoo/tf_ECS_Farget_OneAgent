name: "Deploy ECS with Dynatrace OneAgent"

on:
  workflow_dispatch:
    inputs:
      ecs_cluster_name:
        description: "The name of the target AWS ECS Cluster"
        required: true
        default: "dynatrace-monitored-cluster"
      aws_region:
        description: "AWS Region (leave blank to use the AWS_REGION secret)"
        required: false
      dynatrace_api_url:
        description: "Dynatrace Environment API URL (leave blank to use the DYNATRACE_API_URL secret)"
        required: false
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"

# Shared values so both stages resolve inputs/secrets the same way.
env:
  AWS_REGION: ${{ github.event.inputs.aws_region || secrets.AWS_REGION }}
  ECS_CLUSTER_NAME: ${{ github.event.inputs.ecs_cluster_name || secrets.ECS_CLUSTER_NAME }}
  DYNATRACE_API_URL: ${{ github.event.inputs.dynatrace_api_url || secrets.DYNATRACE_API_URL }}

jobs:
  # ============================================================
  # STAGE 1 — LOGIN TO AWS
  # Authenticates with AWS and confirms the identity/region
  # before any infrastructure work begins.
  # ============================================================
  login:
    name: "Stage 1 · Login to AWS"
    runs-on: ubuntu-latest
    steps:
      - name: "🔑 Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "✅ Verify AWS login"
        run: |
          echo "::group::Confirming AWS identity"
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          ARN=$(aws sts get-caller-identity --query Arn --output text)
          echo "AWS Account : $ACCOUNT"
          echo "Identity    : $ARN"
          echo "Region      : $AWS_REGION"
          echo "::endgroup::"

          {
            echo "### 🔑 Stage 1 — Logged in to AWS"
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Account | \`$ACCOUNT\` |"
            echo "| Region | \`$AWS_REGION\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # STAGE 2 — DEPLOY ON ECS
  # Locates the existing ECS cluster, then runs Terraform to
  # deploy the Fargate service with the Dynatrace OneAgent
  # injected at runtime via a shared volume.
  # ============================================================
  deploy:
    name: "Stage 2 · Deploy on ECS"
    runs-on: ubuntu-latest
    needs: login
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🔑 Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "🔍 Find target ECS cluster"
        run: |
          echo "::group::Looking up ECS cluster '$ECS_CLUSTER_NAME'"
          STATUS=$(aws ecs describe-clusters \
            --clusters "$ECS_CLUSTER_NAME" \
            --query "clusters[0].status" --output text)

          if [ "$STATUS" != "ACTIVE" ]; then
            echo "❌ Cluster '$ECS_CLUSTER_NAME' not found or not ACTIVE (status: $STATUS)."
            echo "   Terraform expects the cluster to already exist."
            exit 1
          fi
          echo "✅ Found ACTIVE cluster: $ECS_CLUSTER_NAME"
          echo "::endgroup::"

      - name: "⚙️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: "🚀 Terraform Init"
        run: |
          echo "::group::Initializing Terraform (S3 backend)"
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=ecs-dynatrace/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
          echo "::endgroup::"

      - name: "🧹 Validate configuration"
        run: |
          echo "::group::terraform fmt -check"
          terraform fmt -check
          echo "::endgroup::"
          echo "::group::terraform validate"
          terraform validate
          echo "::endgroup::"

      - name: "📋 Terraform Plan (OneAgent injection + Fargate service)"
        run: |
          echo "::group::Planning deployment"
          terraform plan \
            -var="cluster_name=$ECS_CLUSTER_NAME" \
            -var="aws_region=$AWS_REGION" \
            -var="dynatrace_api_url=$DYNATRACE_API_URL" \
            -var="dynatrace_paas_token=${{ secrets.DYNATRACE_PAAS_TOKEN }}" \
            -out=tfplan
          echo "::endgroup::"

      - name: "🟢 Terraform Apply — deploy service with OneAgent"
        run: |
          echo "::group::Applying plan"
          terraform apply -auto-approve tfplan
          echo "::endgroup::"

      - name: "📊 Deployment summary"
        if: success()
        run: |
          SERVICE=$(terraform output -raw ecs_service_name)
          TASKDEF=$(terraform output -raw ecs_task_definition_arn)
          {
            echo "### 🟢 Stage 2 — Deployed on ECS"
            echo "The Fargate service is running with the Dynatrace OneAgent"
            echo "injected at runtime via a shared volume (no custom image)."
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Cluster | \`$ECS_CLUSTER_NAME\` |"
            echo "| Service | \`$SERVICE\` |"
            echo "| Task definition | \`$TASKDEF\` |"
            echo "| OneAgent | Injected via \`dynatrace-oneagent-init\` container |"
          } >> "$GITHUB_STEP_SUMMARY"
